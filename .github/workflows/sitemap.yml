name: Generate Sitemap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6  # ✅ 已更新
        with:
          fetch-depth: 0

      - name: Generate the sitemap
        id: sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://www.tennis-leaderboard.cc.cd/

      - name: Output the sitemap stats
        run: |
          echo "urls = ${{ steps.sitemap.outputs.urls-count }}"
          echo "sitemap-path = ${{ steps.sitemap.outputs.sitemap-path }}"

      - name: Commit and push sitemap
        uses: stefanzweifel/git-auto-commit-action@v7  # ✅ 已更新
        with:
          commit_message: "chore: auto-generate sitemap.xml [skip ci]"
          file_pattern: 'sitemap.xml'
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"