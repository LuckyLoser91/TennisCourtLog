  <style>
    body {
  min-width: 680px;
  max-width: 980px;

    h1 {
      font-size: 20px;

      background: var(--accent);

    /* ===== 表格整体 ===== */
    #stats-table {
  min-width: 520px;
  width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  background: var(--bg-card) !important;
  font-size: 13px;
  margin-bottom: 0;
}

    /* ===== 列宽分配 ===== */

.player-view col.c-no         { width: 40px; }
.player-view col.c-tournament { width: 160px; }
.player-view col.c-level      { width: 90px; }
.player-view col.c-surface    { width: 100px; }
.player-view col.c-best       { width: 75px; }
.player-view col.c-w          { width: 48px; }
.player-view col.c-l          { width: 48px; }
.player-view col.c-wr         { width: 55px; }

    /* Tournament View 列宽 */
.tournament-view col.c-no     { width: 38px; }
.tournament-view col.c-player { width: 195px; }

.tournament-view col.c-w      { width: 48px; }

    /* ===== 表头 ===== */

      background: var(--bg-header) !important;
      color: var(--text-muted);
      font-size: 11px;

      text-transform: uppercase;
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid var(--border-main);
      vertical-align: middle;
      white-space: nowrap;
    }
    
    #stats-table th.sortable {
      cursor: pointer;
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    
    #stats-table th.sortable:hover {
      background: var(--bg-hover) !important;
      color: var(--accent);
    }
    
    #stats-table th .sort-indicator {
      margin-left: 4px;
      font-size: 10px;
      display: inline-block;
      vertical-align: middle;
      color: var(--accent) !important;
      opacity: 1 !important;
    }
    
    /* ===== 表格行 ===== */
    #stats-table td {
      padding: 9px 6px;
      text-align: center;
      vertical-align: middle;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      font-size: 13px;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 选手列左对齐 */
    #stats-table td.player-cell {
      text-align: left !important;
      padding-left: 12px !important;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* 赛事列左对齐 */
    #stats-table td.tournament-cell {
      text-align: left !important;
      padding-left: 12px !important;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* 序号列 */
    .col-no {
      color: var(--text-hint);
      font-size: 11px;
      text-align: center;
    }
    
    .form-select, .form-control {
      font-size: 13px !important;
      padding: 6px 12px !important;
      background-color: var(--bg-input) !important;
      color: var(--text-primary) !important;
      border-color: var(--border-input) !important;
      -webkit-text-fill-color: var(--text-primary) !important;
      min-width: 150px;
    }
    
    .form-select:hover, .form-control:hover {
      border-color: var(--accent) !important;
    }
    
    .form-select:focus, .form-control:focus {
      background-color: var(--bg-input) !important;
      color: var(--text-primary) !important;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(180,83,9,0.1) !important;
    }
    #player-select{
      min-width:200px;
    }
    #tourney-select{
      min-width: 140px;
    }
    
    .form-label {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0;
    }
    
    .summary-row td {
      background: var(--bg-hover) !important;
      font-weight: 700;
      border-top: 2px solid var(--accent) !important;
      border-bottom: 2px solid var(--accent) !important;
      color: var(--text-primary);
    }
    /* 强制顶部行不换行，无视小屏断点 */
body > .row {
  flex-wrap: nowrap !important;
}
body > .row > .col {
  flex: 1 1 auto !important;
  max-width: none !important;
  width: auto !important;
}
body > .row > .col-auto {
  flex: 0 0 auto !important;
}
body > .row .d-flex.gap-2 {
  flex-wrap: nowrap !important;
}
/* 表格隔行交替色 */
#stats-table tbody tr:nth-child(odd) td {
  background: var(--bg-card);
}
#stats-table tbody tr:nth-child(even) td {
  background: var(--bg-row-alt);
}

  background: var(--bg-hover) !important;
}

<body>

  <!-- ========== 第一行：标题 + HOME 按钮 ========== -->
  <div class="row align-items-center mb-3">
    <div class="col">
      <h1 class="mb-0">📊 WTA Top 100 · Elite Event History</h1>
    </div>
    <div class="col-auto">
      <a href="../index.html" class="btn btn-outline-warning btn-sm">HOME</a>
    </div>
  </div>

  <!-- ========== 第二行：左侧文字 + 右侧筛选控件 ========== -->
  <div class="row align-items-center mb-4">
    <div class="col">
      <small class="text-muted">
        <span class="text-warning">Grand Slams · WTA 1000</span>
        &nbsp;|&nbsp;<span id="last-updated"></span>
      </small>
    </div>
    <div class="col-auto">
      <div class="d-flex gap-2 align-items-center">
        <div class="d-flex align-items-center">
          <label for="view-select" class="form-label mb-0 me-1 small text-nowrap">View mode</label>
          <select id="view-select" class="form-select form-select-sm">
            <option value="tournament" selected>🏟️ By Tournament</option>
            <option value="player">🎾 By Player</option>
          </select>
        </div>
        <div class="d-flex align-items-center" id="selector-container">
          <!-- JS 动态填充第二个选择框 -->
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 第三行：表格 ========== -->
  <div class="row">
    <div class="col-12">

        <table id="stats-table" class="table table-hover table-sm mb-0"></table>

    </div>
  </div>

  <script type="module">
    import { getFlagImg, fmtBestRound, fmtWinrate } from './utils.js?v=202604291654';

    // ---------- 辅助函数 ----------
    function toTitleCase(str) {
      return str.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
    }

    // ---------- 常量 ----------
    const ROUND_ORDER = {
      'W': 8,
      'F': 7,
      'SF': 6,
      'QF': 5,
      'R16': 4,
      'R32': 3,
      'R64': 2,
      'R128': 1
    };

    const LEVEL_ORDER = {
      'Grand Slam': 1,
      'WTA1000': 2
    };

    function normalizeLevel(level) {
      if (!level) return '';
      const trimmed = level.trim();
      if (trimmed === 'WTA 1000' || trimmed === 'WTA1000') return 'WTA1000';
      return trimmed;
    }

    function isBigLevel(level) {
      const norm = normalizeLevel(level);
      return norm === 'Grand Slam' || norm === 'WTA1000';
    }

    // ---------- 全局变量 ----------
    let fullData = [];
    let calendarData = [];
    let currentView = 'tournament';
    let currentSelected = null;
    let currentSort = { column: null, direction: 'desc' };

    const viewSelect = document.getElementById('view-select');
    const selectorContainer = document.getElementById('selector-container');
    const tableContainer = document.getElementById('stats-table');

    // ---------- 加载数据 ----------
    async function loadData() {
      try {
        const [statsRes, calendarRes] = await Promise.all([
          fetch('../output/top100_big_tournament_stats.json'),
          fetch('../output/calendar-2026.json')
        ]);
        fullData = await statsRes.json();
        const cal = await calendarRes.json();
        calendarData = cal.content || [];
        console.log(`✅ 加载 ${fullData.length} 名球员，${calendarData.length} 个赛事`);
        initView();
      } catch (err) {
        console.error('❌ 加载失败:', err);
        tableContainer.innerHTML = '<tr><td colspan="8" style="color:#b91c1c; padding:40px; text-align:center;">数据加载失败</td></tr>';
      }
    }

    // ---------- 初始化 ----------
    function initView() {
      const tourneyList = getSortedTourneyList();
      currentSelected = tourneyList[0]?.name || '';
      currentView = 'tournament';
      viewSelect.value = 'tournament';
      currentSort = { column: null, direction: 'desc' };
      renderSelector();
      renderTable();
    }

    function buildTourneyInfoMap() {
      const map = new Map();
      calendarData.forEach(t => {
        const group = t.tournamentGroup || {};
        const rawName = group.name;
        if (!rawName) return;
        const name = toTitleCase(rawName);

        const level = normalizeLevel(t.level);
        if (!isBigLevel(level)) return;

        const start = t.startDate || '';
        const end = t.endDate || '';
        const surface = t.surface || '';
        const inOut = t.inOutdoor || '';
        const surfaceFull = surface ? `${surface} (${inOut === 'O' ? 'Outdoor' : (inOut === 'I' ? 'Indoor' : '')})` : '';

        if (!map.has(name)) {
          map.set(name, { level, startDate: start, endDate: end, surface: surfaceFull });
        }
      });
      return map;
    }

    function getSortedTourneyList() {
      const infoMap = buildTourneyInfoMap();
      const list = [];
      for (let [name, info] of infoMap.entries()) {
        list.push({ name, ...info });
      }
      list.sort((a, b) => {
        const la = LEVEL_ORDER[a.level] || 99;
        const lb = LEVEL_ORDER[b.level] || 99;
        if (la !== lb) return la - lb;
        return (a.startDate || '').localeCompare(b.startDate || '');
      });
      return list;
    }

    function renderSelector() {
      let html = '';
      if (currentView === 'player') {
        const sorted = [...fullData].sort((a, b) => a.rank - b.rank);
        html = `
          <label for="player-select" class="form-label mb-0 me-1 small text-nowrap">Player</label>
          <select id="player-select" class="form-select form-select-sm">
            ${sorted.map(p => {
              const sel = p.player_name === currentSelected ? 'selected' : '';
              return `<option value="${p.player_name}" ${sel}>#${p.rank} ${p.player_name}</option>`;
            }).join('')}
          </select>
        `;
      } else {
        const tourneyList = getSortedTourneyList();
        if (!currentSelected || !tourneyList.some(t => t.name === currentSelected)) {
          currentSelected = tourneyList[0]?.name || '';
        }
        html = `
          <label for="tourney-select" class="form-label mb-0 me-1 small text-nowrap">Tournament</label>
          <select id="tourney-select" class="form-select form-select-sm">
            ${tourneyList.map(t => {
              const sel = t.name === currentSelected ? 'selected' : '';
              return `<option value="${t.name}" ${sel}>${t.name}</option>`;
            }).join('')}
          </select>
        `;
      }
      selectorContainer.innerHTML = html;

      const selectEl = currentView === 'player'
        ? document.getElementById('player-select')
        : document.getElementById('tourney-select');

      if (selectEl) {
        selectEl.addEventListener('change', (e) => {
          currentSelected = e.target.value;
          currentSort = { column: null, direction: 'desc' };
          renderTable();
        });
      }
    }

    function renderTable() {
      if (currentView === 'player') {
        renderPlayerView();
      } else {
        renderTournamentView();
      }
      bindSortEvents();
    }

    function sortPlayerTournamentsDefault(tournaments) {
      return [...tournaments].sort((a, b) => {
        const la = LEVEL_ORDER[a.level] || 99;
        const lb = LEVEL_ORDER[b.level] || 99;
        if (la !== lb) return la - lb;
        return (a.startDate || '').localeCompare(b.startDate || '');
      });
    }

    function sortTournamentPlayersDefault(players) {
      return [...players].sort((a, b) => a.rank - b.rank);
    }

    function renderPlayerView() {
      const player = fullData.find(p => p.player_name === currentSelected);
      if (!player) return;

      const infoMap = buildTourneyInfoMap();
      const tournaments = player.tournaments
        .filter(t => isBigLevel(t.level))
        .map(t => {
          const calInfo = infoMap.get(t.tourney_name) || {};
          const notPlayed = t.best_round == null;
          return {
            ...t,
            level: normalizeLevel(t.level),
            startDate: calInfo.startDate || '',
            endDate: calInfo.endDate || '',
            surface: calInfo.surface || '',
            W: notPlayed ? -1 : t.W,
            L: notPlayed ? -1 : t.L,
            winrate: notPlayed ? -1 : t.winrate,
            titles: t.titles || (t.best_round === 'W' ? 1 : 0)
          };
        });

      let rows = tournaments;
      if (currentSort.column && currentSort.column !== 'tournament') {
        rows = sortRows(rows, currentSort.column, currentSort.direction);
      } else {
        rows = sortPlayerTournamentsDefault(rows);
      }

      // 添加 colgroup 用于列宽控制
      let html = `
        <colgroup class="player-view">
          <col class="c-no">
          <col class="c-tournament">
          <col class="c-level">
          <col class="c-surface">
          <col class="c-best">
          <col class="c-w">
          <col class="c-l">
          <col class="c-wr">
        </colgroup>
        <thead>
          <tr>
            <th>#</th>
            <th class="sortable" data-column="tournament">Tournament <span class="sort-indicator"></span></th>
            <th>Level</th>
            <th>Surface</th>
            <th class="sortable" data-column="best_round">Best Round <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="W">W <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="L">L <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="winrate">Win% <span class="sort-indicator"></span></th>
          </tr>
        </thead>
        <tbody>
      `;

      rows.forEach((t, idx) => {
        const notPlayed = t.best_round == null;
        const titles = t.titles || 1;
        let bestRoundDisplay;
        if (notPlayed) {
          bestRoundDisplay = '—';
        } else {
          bestRoundDisplay = fmtBestRound(t.best_round, titles);
        }
        
        const wDisplay = notPlayed ? '—' : t.W;
        const lDisplay = notPlayed ? '—' : t.L;
        const wrDisplay = notPlayed ? '—' : fmtWinrate((t.winrate * 100).toFixed(1));
        html += `
          <tr>
            <td class="col-no">${idx + 1}</td>
            <td class="tournament-cell">${t.tourney_name}</td>
            <td>${t.level}</td>
            <td>${t.surface || '—'}</td>
            <td>${bestRoundDisplay}</td>
            <td>${wDisplay}</td>
            <td>${lDisplay}</td>
            <td>${wrDisplay}</td>
          </tr>`;
      });

      // ========== 汇总行 ==========
      const allEvents = player.tournaments.filter(t => isBigLevel(t.level));
      const totalEvents = allEvents.length;
      let totalW = 0, totalL = 0, championCount = 0;
      allEvents.forEach(t => {
        if (t.best_round != null) {
          totalW += t.W;
          totalL += t.L;
          if (t.best_round === 'W') championCount++;
        }
      });
      const totalWR = (totalW + totalL) > 0
        ? (totalW / (totalW + totalL) * 100).toFixed(1)
        : null;

      html += `<tr class="summary-row">
        <td></td>
        <td></td>
        <td></td>
        <td style="text-align:center;">${player.player_name}:</td>
        <td>${championCount}/${totalEvents}</td>
        <td>${totalW}</td>
        <td>${totalL}</td>
        <td>${totalWR !== null ? fmtWinrate(totalWR) : '—'}</td>
      </tr>`;

      html += `</tbody>`;
      tableContainer.innerHTML = html;
      highlightSortIndicator();
    }

    function renderTournamentView() {
      const tournamentName = currentSelected;
      const participants = [];

      fullData.forEach(player => {
        const t = player.tournaments.find(t =>
          t.tourney_name === tournamentName && isBigLevel(t.level)
        );
        if (t) {
          const notPlayed = t.best_round == null;
          participants.push({
            rank: player.rank,
            player_name: player.player_name,
            ioc: player.ioc,
            dob: player.dob || '—',
            best_round: t.best_round,
            W: notPlayed ? -1 : t.W,
            L: notPlayed ? -1 : t.L,
            winrate: notPlayed ? -1 : t.winrate,
            titles: t.titles || (t.best_round === 'W' ? 1 : 0)
          });
        }
      });

      let rows = participants;

      if (currentSort.column && currentSort.column !== 'player') {
        rows = sortRows(rows, currentSort.column, currentSort.direction);
      } else {
        rows = sortTournamentPlayersDefault(rows);
      }

      // 添加 colgroup 用于列宽控制
      let html = `
        <colgroup class="tournament-view">
          <col class="c-no">
          <col class="c-player">
          <col class="c-dob">
          <col class="c-best">
          <col class="c-w">
          <col class="c-l">
          <col class="c-wr">
        </colgroup>
        <thead>
          <tr>
            <th>#</th>
            <th class="sortable" data-column="player">Player <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="dob">DOB <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="best_round">Best Round <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="W">W <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="L">L <span class="sort-indicator"></span></th>
            <th class="sortable" data-column="winrate">Win% <span class="sort-indicator"></span></th>
          </tr>
        </thead>
        <tbody>
      `;

      rows.forEach((p, idx) => {
        const notPlayed = p.best_round == null;
        let bestRoundDisplay;
        if (notPlayed) {
          bestRoundDisplay = '—';
        } else {
          const titles = p.titles || 1;
          bestRoundDisplay = fmtBestRound(p.best_round, p.titles);
        }
        const wDisplay = notPlayed ? '—' : p.W;
        const lDisplay = notPlayed ? '—' : p.L;
        const wrDisplay = notPlayed ? '—' : fmtWinrate((p.winrate * 100).toFixed(1));
        html += `
          <tr>
            <td class="col-no">${idx + 1}</td>
            <td class="player-cell">${getFlagImg(p.ioc)} #${p.rank} ${p.player_name}</td>
            <td>${p.dob}</td>
            <td>${bestRoundDisplay}</td>
            <td>${wDisplay}</td>
            <td>${lDisplay}</td>
            <td>${wrDisplay}</td>
          </tr>`;
      });

      if (rows.length === 0) {
        html += `<tr><td colspan="7" style="padding:20px; text-align:center; color:var(--text-muted);">No Top 100 players have competed in this event.</td></tr>`;
      }

      html += `</tbody>`;
      tableContainer.innerHTML = html;
      highlightSortIndicator();
    }

    function sortRows(rows, column, direction) {
      const sorted = [...rows];
      sorted.sort((a, b) => {
        let valA = a[column];
        let valB = b[column];

        if (column === 'best_round') {
          const orderA = ROUND_ORDER[valA] || 0;
          const orderB = ROUND_ORDER[valB] || 0;
          if (orderA !== orderB) {
            return direction === 'asc' ? orderA - orderB : orderB - orderA;
          }
          const titlesA = a.titles || 0;
          const titlesB = b.titles || 0;
          if (titlesA !== titlesB) {
            return direction === 'asc' ? titlesA - titlesB : titlesB - titlesA;
          }
          const wrA = a.winrate ?? -1;
          const wrB = b.winrate ?? -1;
          return wrB - wrA;
        }

        if (typeof valA === 'number' && typeof valB === 'number') {
          return direction === 'asc' ? valA - valB : valB - valA;
        }

        const strA = String(valA || '');
        const strB = String(valB || '');
        return direction === 'asc'
          ? strA.localeCompare(strB)
          : strB.localeCompare(strA);
      });
      return sorted;
    }

    function bindSortEvents() {
      document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', (e) => {
          const column = th.dataset.column;
          if (!column) return;

          if (column === 'tournament' || column === 'player') {
            currentSort = { column: null, direction: 'desc' };
          } else {
            if (currentSort.column === column) {
              currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
              currentSort.column = column;
              currentSort.direction = 'desc';
            }
          }
          renderTable();
        });
      });
    }

    function highlightSortIndicator() {
      document.querySelectorAll('th.sortable').forEach(th => {
        const span = th.querySelector('.sort-indicator');
        if (!span) return;
        const col = th.dataset.column;
        if (currentSort.column && currentSort.column === col && col !== 'tournament' && col !== 'player') {
          span.textContent = currentSort.direction === 'asc' ? ' ▲' : ' ▼';
        } else {
          span.textContent = '';
        }
      });
    }

    // ---------- 切换视图 ----------
    viewSelect.addEventListener('change', (e) => {
      currentView = e.target.value;
      currentSort = { column: null, direction: 'desc' };
      if (currentView === 'player') {
        const sorted = [...fullData].sort((a, b) => a.rank - b.rank);
        currentSelected = sorted[0]?.player_name || '';
      } else {
        const list = getSortedTourneyList();
        currentSelected = list[0]?.name || '';
      }
      renderSelector();
      renderTable();
    });

    // 启动
    loadData();
    
    // 设置更新时间
    const updateEl = document.getElementById('last-updated');
    if (updateEl) {
      updateEl.textContent = 'Last updated: 2026-04-20';
    }
  </script>
</body>

</html>
