<!doctype html>
<html lang="en">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-C15B9S69WR"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-C15B9S69WR");

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,user-scalable=yes"
    />
    <title>Grand Slam Champions · WTA · ATP · Age Cutoff</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=202604291654" />
    <style>
      /* ===== 页面宽度限制：手机到宽屏都合适 ===== */
      body {
        width: 1280px;
      }

      /* ===== 表格整体 ===== */
      .table {
        min-width: 900px; /* 保证内容不压缩 */
        width: 100%;
        table-layout: fixed; /* 各列宽度可控 */
        border-collapse: collapse;
        background: var(--bg-card) !important;
        font-size: 13px;
        margin-bottom: 0;
      }

      /* ===== 列宽分配（合计 ≈ 900px，紧凑均衡）===== */
      col.c-no {
        width: 40px;
      }
      col.c-player {
        width: 290px;
      }
      col.c-first {
        width: 50px;
      }
      col.c-agefirst {
        width: 60px;
      }
      col.c-last {
        width: 50px;
      }
      col.c-agelast {
        width: 60px;
      }
      col.c-span {
        width: 45px;
      }
      col.c-titles {
        width: 70px;
      }
      col.c-breakdown {
        width: 170px;
      }
      col.c-w {
        width: 50px;
      }
      col.c-l {
        width: 50px;
      }
      col.c-agg {
        width: 60px;
      }
      col.c-h {
        width: 60px;
      }
      col.c-c {
        width: 60px;
      }
      col.c-g {
        width: 60px;
      }

      /* ===== 表头 ===== */
      .table thead th {
        padding: 10px 6px;
      }
      .table thead tr:first-child th {
        border-bottom: none !important;
        padding-bottom: 3px;
        font-size: 10px !important;
        letter-spacing: 0.1em;
        color: #a78b5e;
      }

      /* ===== 表格行 ===== */
      .table td {
        padding: 9px 6px;
        text-align: center;
        vertical-align: middle;
        border-bottom: 1px solid var(--border-light);
        color: var(--text-primary);
        font-size: 13.5px;
        background: transparent;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .table tbody tr:nth-child(odd) td {
        background: var(--bg-card);
      }
      .table tbody tr:nth-child(even) td {
        background: var(--bg-row-alt);
      }
      .table tbody tr:hover td {
        background: var(--bg-hover) !important;
      }

      /* ===== 选手列：左对齐 ===== */
      #table-body td:nth-child(2) {
        text-align: left !important;
        padding-left: 12px !important;
        font-weight: 600;
        color: var(--text-primary);
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* breakdown列：左对齐 */
      #table-body td:nth-child(9) {
        text-align: left !important;
        padding-left: 8px !important;
        color: var(--text-muted);
        font-size: 12px !important;
      }

      /* ===== 序号列 ===== */
      .col-no {
        color: var(--text-muted);
        font-size: 12px;
        text-align: center;
      }

      /* ===== SPAN 列高亮 ===== */
      .span-val {
        color: var(--accent);
        font-weight: 700;
      }

      /* ===== W / L 列 ===== */
      .col-w {
        color: var(--text-secondary);
        font-weight: 600;
      }
      .col-l {
        color: var(--text-muted);
      }

      .wr-cell {
        border-radius: 5px;
        padding: 3px 4px;
        display: block;
        text-align: center;
        font-weight: 600;
        font-size: 13px;
      }

      .titles-cell {
        font-weight: 700;
        border-radius: 5px;
        padding: 3px 0;
        display: block;
        text-align: center;
      }

      .legend-dot {
        display: inline-block;
        width: 13px;
        height: 13px;
        border-radius: 3px;
        vertical-align: middle;
        margin: 0 2px;
      }
    </style>
  </head>

  <body>
    <!-- 第一行：标题 + HOME -->
    <div class="row align-items-center mb-3">
      <div class="col">
        <h1 class="mb-0">🏆 Grand Slam Singles · Champions Leaderboard</h1>
      </div>
      <div class="col-auto">
        <a href="../index.html" class="btn btn-outline-warning btn-sm">HOME</a>
      </div>
    </div>

    <!-- 第二行：统计信息 + 筛选控件 -->
    <div class="row align-items-center mb-3">
      <div class="col">
        <span class="top-meta">
          <span id="champion-count" class="count-label">0 champions</span>
          &nbsp;|&nbsp; Click headers to sort &nbsp;|&nbsp;
          <span id="last-updated"></span>
        </span>
      </div>
      <div class="col-auto">
        <div class="d-flex gap-2 align-items-center">
          <div class="d-flex align-items-center gap-1">
            <label for="tourSelect" class="form-label mb-0 text-nowrap"
              >TOUR:</label
            >
            <select id="tourSelect" class="form-select form-select-sm">
              <option value="wta" selected>WTA</option>
              <option value="atp">ATP</option>
            </select>
          </div>
          <div class="d-flex align-items-center gap-1">
            <label for="ageSelect" class="form-label mb-0 text-nowrap"
              >CUTOFF AGE:</label
            >
            <select id="ageSelect" class="form-select form-select-sm">
              <option value="career" selected>Career (All ages)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 第三行：表格 -->
    <table class="table table-hover table-sm mb-0">
      <colgroup>
        <col class="c-no" />
        <col class="c-player" />
        <col class="c-first" />
        <col class="c-agefirst" />
        <col class="c-last" />
        <col class="c-agelast" />
        <col class="c-span" />
        <col class="c-titles" />
        <col class="c-breakdown" />
        <col class="c-w" />
        <col class="c-l" />
        <col class="c-agg" />
        <col class="c-h" />
        <col class="c-c" />
        <col class="c-g" />
      </colgroup>
      <thead>
        <tr>
          <th colspan="11"></th>
          <th
            colspan="4"
            style="text-align: center; border-bottom: none; padding-bottom: 3px"
          >
            WINRATE
          </th>
        </tr>
        <tr>
          <th>#</th>
          <th class="sortable" data-col="player">PLAYER</th>
          <th class="sortable" data-col="firstYear">1ST</th>
          <th class="sortable" data-col="ageFirst">AGE 1ST</th>
          <th class="sortable" data-col="lastYear">LAST</th>
          <th class="sortable" data-col="ageLast">AGE LAST</th>
          <th class="sortable" data-col="span">SPAN</th>
          <th class="sortable" data-col="titles">TITLES</th>
          <th>BREAKDOWN</th>
          <th class="sortable" data-col="W">W</th>
          <th class="sortable" data-col="L">L</th>
          <th
            class="sortable"
            data-col="agg"
            style="border-left: 1px solid var(--border-main)"
          >
            AGG
          </th>
          <th class="sortable" data-col="hard">H</th>
          <th class="sortable" data-col="clay">C</th>
          <th class="sortable" data-col="grass">G</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
      <tfoot>
        <tr class="table-footer-row">
          <td colspan="15" id="table-footer"></td>
        </tr>
      </tfoot>
    </table>

    <script type="module">
      import {
        getFlagImg,
        fmtAge,
        fmtWinrate,
      } from "./utils.js?v=202604291654";

      let dataMap = {};
      let currentTour = "wta";
      let currentAge = null;
      let minAge = 18,
        maxAge = 45;
      let countryChampionCount = new Map();
      let countryTotalTitles = new Map();

      /* ---- 新 TITLES 配色 ---- */
      function titlesCls(n) {
        if (n >= 10) return "titles-cell titles-10";
        if (n >= 5) return "titles-cell titles-5";
        if (n >= 2) return "titles-cell titles-2";
        return "titles-cell titles-1";
      }

      /* ---- 新 WINRATE 配色 ---- */
      function aggCls(pct) {
        if (pct == null) return "wr-cell agg-no";
        if (pct >= 90) return "wr-cell agg-90";
        if (pct >= 85) return "wr-cell agg-85";
        if (pct >= 80) return "wr-cell agg-80";
        if (pct >= 75) return "wr-cell agg-75";
        if (pct >= 70) return "wr-cell agg-70";
        return "wr-cell agg-no";
      }
      function surfCls(pct) {
        if (pct == null) return "wr-cell surf-no";
        if (pct >= 90) return "wr-cell surf-90";
        if (pct >= 85) return "wr-cell surf-85";
        if (pct >= 80) return "wr-cell surf-80";
        if (pct >= 75) return "wr-cell surf-75";
        if (pct >= 70) return "wr-cell surf-70";
        return "wr-cell surf-no";
      }

      /* ---- 脚注图例 ---- */
      function buildFooterLegend() {
        const dots = [
          ["#1e3a8a", "#dbeafe", "≥2"],
          ["#3f6212", "#ecfccb", "≥5"],
          ["#92400e", "#fef3c7", "≥10"],
        ];
        const wrDots = [
          ["#ca8a04", "≥70%"],
          ["#65a30d", "≥75%"],
          ["#16a34a", "≥80%"],
          ["#0d9488", "≥85%"],
          ["#0f766e", "≥90%"],
        ];
        const titlesHtml = dots
          .map(
            ([bg, fg, label]) =>
              `${label}<span class="legend-dot" style="background:${bg};"></span>`,
          )
          .join(" ");
        const wrHtml = wrDots
          .map(
            ([bg, label]) =>
              `${label}<span class="legend-dot" style="background:${bg};"></span>`,
          )
          .join(" ");
        return `
          <span>Titles:</span> ${titlesHtml} &nbsp;·&nbsp;
          <span>AGG / Surface win rate:</span> ${wrHtml}
        `;
      }

      const footerPrefix = `
        1ST = year of first GS title &nbsp;·&nbsp;
        AGE 1ST / AGE LAST = age at first / last title &nbsp;·&nbsp;
        SPAN = last − first + 1
        <br>
        AO = Australian Open · RG = Roland Garros · WIM = Wimbledon · USO = US Open
        <br>
        AGG = aggregate GS win rate &nbsp;·&nbsp;
        H = Hard · C = Clay · G = Grass
        <br>
      `;

      /* ---- 数据加载 ---- */
      async function loadData() {
        try {
          const res = await fetch("../output/tour_gs_champions.json");
          const data = await res.json();
          dataMap = data;
          if (data.meta) {
            minAge = data.meta.min_age;
            maxAge = data.meta.max_age;
          }
          initAgeSelector();
          resetToDefault();
          renderTable();
        } catch (err) {
          console.error("❌ 数据加载失败：", err);
          document.getElementById("table-body").innerHTML =
            '<tr><td colspan="15" style="padding:40px;text-align:center;color:#b91c1c;">Failed to load data.</td></tr>';
        }
      }

      function initAgeSelector() {
        const select = document.getElementById("ageSelect");
        if (!select) return;
        while (select.options.length > 1) select.remove(1);
        for (let age = minAge; age <= maxAge; age++) {
          const opt = document.createElement("option");
          opt.value = age;
          opt.textContent = age;
          select.appendChild(opt);
        }
        select.addEventListener("change", (e) => {
          currentAge =
            e.target.value === "career" ? null : parseInt(e.target.value);
          resetToDefault();
          renderTable();
        });
      }

      function getPlayerDataByAge(player, age) {
        if (age === null) return player;
        if (player.age_entries && Array.isArray(player.age_entries)) {
          const entry = player.age_entries.find((e) => e.age === age);
          if (entry) return entry;
          return player.age_entries[player.age_entries.length - 1];
        }
        return player;
      }

      /* ---- 排序 ---- */
      let sortState = [];
      let userSorted = false;

      function getValueByCol(pd, col) {
        if (!pd) return null;
        const map = {
          player: pd.player,
          firstYear: pd.first_year,
          ageFirst: pd.age_first,
          lastYear: pd.last_year,
          ageLast: pd.age_last,
          span: pd.span,
          titles: pd.titles,
          W: pd.W,
          L: pd.L,
          agg: pd.agg,
          hard: pd.win_h,
          clay: pd.win_c,
          grass: pd.win_g,
        };
        return map[col] ?? null;
      }

      function compareValues(a, b, col, order) {
        if (col !== "player") {
          const dataA = getPlayerDataByAge(a, currentAge);
          const dataB = getPlayerDataByAge(b, currentAge);
          let valA = getValueByCol(dataA, col);
          let valB = getValueByCol(dataB, col);
          const nullA = valA == null,
            nullB = valB == null;
          if (nullA && nullB) return 0;
          if (nullA) return 1;
          if (nullB) return -1;
          valA = Number(valA);
          valB = Number(valB);
          if (valA < valB) return order === "asc" ? -1 : 1;
          if (valA > valB) return order === "asc" ? 1 : -1;
          return 0;
        } else {
          const iocA = a.ioc || "",
            iocB = b.ioc || "";
          const ccA = countryChampionCount.get(iocA) || 0;
          const ccB = countryChampionCount.get(iocB) || 0;
          if (ccA !== ccB) return order === "asc" ? ccA - ccB : ccB - ccA;
          const ttA = countryTotalTitles.get(iocA) || 0;
          const ttB = countryTotalTitles.get(iocB) || 0;
          if (ttA !== ttB) return order === "asc" ? ttA - ttB : ttB - ttA;
          if (iocA < iocB) return order === "asc" ? -1 : 1;
          if (iocA > iocB) return order === "asc" ? 1 : -1;
          return 0;
        }
      }

      function sortRows(rows) {
        if (!sortState.length) return rows;
        return [...rows].sort((a, b) => {
          for (let rule of sortState) {
            const cmp = compareValues(a, b, rule.col, rule.order);
            if (cmp !== 0) return cmp;
          }
          return 0;
        });
      }

      function updateSortIndicators() {
        document.querySelectorAll(".sortable").forEach((th) => {
          const ind = th.querySelector(".sort-indicator");
          if (ind) ind.remove();
        });
        if (!userSorted || !sortState.length) return;
        const primary = sortState[0];
        const th = document.querySelector(`th[data-col="${primary.col}"]`);
        if (th) {
          const span = document.createElement("span");
          span.className = "sort-indicator";
          span.textContent = " " + (primary.order === "asc" ? "▲" : "▼");
          th.appendChild(span);
        }
      }

      function resetToDefault() {
        sortState = [
          { col: "titles", order: "desc" },
          { col: "firstYear", order: "asc" },
          { col: "W", order: "desc" },
        ];
        userSorted = false;
      }

      function handleSortClick(e) {
        const col = e.currentTarget.getAttribute("data-col");
        if (!col) return;
        userSorted = true;
        const idx = sortState.findIndex((s) => s.col === col);
        const newOrder =
          idx !== -1 && sortState[idx].order === "desc" ? "asc" : "desc";
        if (idx !== -1) sortState.splice(idx, 1);
        sortState.unshift({ col, order: newOrder });
        renderTable();
      }

      /* ---- 渲染 ---- */
      function renderTable() {
        const players = dataMap[currentTour] || [];

        countryChampionCount.clear();
        countryTotalTitles.clear();
        for (const p of players) {
          const ioc = p.ioc || "";
          countryChampionCount.set(
            ioc,
            (countryChampionCount.get(ioc) || 0) + 1,
          );
          countryTotalTitles.set(
            ioc,
            (countryTotalTitles.get(ioc) || 0) + (p.titles || 0),
          );
        }

        const sorted = sortRows(players);
        document.getElementById("champion-count").textContent =
          sorted.length + " champions";
        document.getElementById("table-footer").innerHTML =
          footerPrefix + buildFooterLegend();

        let html = "";
        sorted.forEach((player, idx) => {
          const pd = getPlayerDataByAge(player, currentAge);
          const titlesNum = pd.titles ?? 0;
          const careerTitles = player.titles ?? 0;
          const titleDisplay =
            currentAge === null
              ? careerTitles
              : `${titlesNum} / ${careerTitles}`;

          html += `<tr>
            <td class="col-no">${idx + 1}</td>
            <td class="player-name">
              ${getFlagImg(player.ioc)} ${player.player}
              <span class="player-dob">(${player.dob})</span>
            </td>
            <td>${pd.first_year ?? "—"}</td>
            <td>${fmtAge(pd.age_first)}</td>
            <td>${pd.last_year ?? "—"}</td>
            <td>${fmtAge(pd.age_last)}</td>
            <td><span class="span-val">${pd.span ?? 0}</span></td>
            <td><span class="${titlesCls(titlesNum)}">${titleDisplay}</span></td>
            <td style="text-align:left;padding-left:8px;color:var(--text-muted);font-size:12px;white-space:nowrap;">${pd.titles_str || "—"}</td>
            <td class="col-w">${pd.W ?? 0}</td>
            <td class="col-l">${pd.L ?? 0}</td>
            <td style="border-left:1px solid var(--border-light);"><span class="${aggCls(pd.agg)}">${fmtWinrate(pd.agg)}</span></td>
            <td><span class="${surfCls(pd.win_h)}">${fmtWinrate(pd.win_h)}</span></td>
            <td><span class="${surfCls(pd.win_c)}">${fmtWinrate(pd.win_c)}</span></td>
            <td><span class="${surfCls(pd.win_g)}">${fmtWinrate(pd.win_g)}</span></td>
          </tr>`;
        });

        document.getElementById("table-body").innerHTML =
          html ||
          '<tr><td colspan="15" style="padding:40px;text-align:center;color:var(--text-muted);">No data</td></tr>';
        updateSortIndicators();
      }

      document.querySelectorAll(".sortable").forEach((th) => {
        th.addEventListener("click", handleSortClick);
      });
      document.getElementById("tourSelect")?.addEventListener("change", (e) => {
        currentTour = e.target.value;
        resetToDefault();
        renderTable();
      });

      loadData();

      const updateEl = document.getElementById("last-updated");
      if (updateEl) updateEl.textContent = "Last updated: 2026-04-20";
    </script>
  </body>
</html>
