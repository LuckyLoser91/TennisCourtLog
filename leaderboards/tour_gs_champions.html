<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grand Slam Champions · WTA · ATP · Age Cutoff</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111827;
      font-family: 'Segoe UI', 'Apple Color Emoji', 'Noto Color Emoji', 'EmojiOne Color', 'Twemoji Mozilla', sans-serif;
      padding: 36px 44px 60px;
      min-width: 1400px;
    }
    h1 { color: #f5c842; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .sub {
      color: #6b7280; font-size: 11px; letter-spacing: 0.07em;
      text-transform: uppercase; margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .sub span { color: #f5c842; }
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .tour-selector, .age-selector {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tour-selector label, .age-selector label {
      color: #9ca3af;
      font-size: 12px;
    }
    .tour-selector select, .age-selector select {
      background: #1f2937;
      color: #f3f4f6;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    .tour-selector select:hover, .age-selector select:hover {
      border-color: #f5c842;
    }
    table { border-collapse: collapse; width: 100%; }
    thead tr { border-bottom: 1px solid #374151; }
    thead th {
      color: #6b7280; font-size: 10.5px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 5px 8px 9px; text-align: center; white-space: nowrap;
    }
    thead th.left { text-align: left; padding-left: 8px; }
    thead .gr th {
      color: #4b5563; font-size: 10px; border-bottom: none; padding-bottom: 2px;
    }
    .dl { border-left: 1px solid #374151; }
    tbody tr { border-bottom: 1px solid #1f2937; }
    tbody tr:hover { background: #1f2937; }
    tbody td { padding: 6px 8px; font-size: 12.5px; }
    tfoot td {
      padding-top: 20px; color: #4b5563;
      font-size: 10px; letter-spacing: 0.04em;
    }
    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    th.sortable:hover {
      color: #f5c842;
    }
    .sort-indicator {
      display: inline-block;
      margin-left: 4px;
      font-size: 9px;
      color: #f5c842;
    }
    .flag { font-size: 1.2em; margin-right: 6px; vertical-align: middle; }
  </style>
</head>
<body>

<h1>Grand Slam Singles · Champions Leaderboard</h1>
<div class="sub">
  <div>
    <span id="champion-count">0 champions</span> &nbsp;|&nbsp;
    Grand Slam matches only &nbsp;|&nbsp;
    Walkovers excluded &nbsp;|&nbsp;
    <span style="color:#9ca3af;">Click headers to sort</span>
  </div>
  <div class="controls">
    <div class="tour-selector">
      <label for="tourSelect">TOUR:</label>
      <select id="tourSelect">
        <option value="wta" selected>WTA</option>
        <option value="atp">ATP</option>
      </select>
    </div>
    <div class="age-selector">
      <label for="ageSelect">CUTOFF AGE:</label>
      <select id="ageSelect">
        <option value="career" selected>Career (All ages)</option>
      </select>
    </div>
  </div>
</div>

<table>
  <thead>
    <tr class="gr">
      <th colspan="11"></th>
      <th colspan="4" class="dl" style="text-align:center;color:#9ca3af;">WINRATE</th>
    </tr>
    <tr>
      <th>#</th>
      <th class="left sortable" data-col="player">PLAYER</th>
      <th class="sortable" data-col="firstYear">1ST TITLE</th>
      <th class="sortable" data-col="ageFirst">AGE 1ST</th>
      <th class="sortable" data-col="lastYear">LAST TITLE</th>
      <th class="sortable" data-col="ageLast">AGE LAST</th>
      <th class="sortable" data-col="span">SPAN</th>
      <th class="sortable" data-col="titles">TITLES</th>
      <th class="left">BREAKDOWN</th>
      <th class="sortable" data-col="W">W</th>
      <th class="sortable" data-col="L">L</th>
      <th class="dl sortable" data-col="agg">AGG</th>
      <th class="sortable" data-col="hard">H</th>
      <th class="sortable" data-col="clay">C</th>
      <th class="sortable" data-col="grass">G</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
  <tfoot>
    <tr><td colspan="15" id="table-footer"></td></tr>
  </tfoot>
</table>

<script>
  let dataMap = {};
  let currentTour = 'wta';
  let currentAge = null;
  let minAge = 18, maxAge = 45;

  // 存储每个国家（iso2）的冠军人数（不同选手数）
  let countryChampionCount = new Map();
  // 存储每个国家的总冠军数
  let countryTotalTitles = new Map();

  function getFlagImg(iso2) {
    if (!iso2) return '<span title="Unknown">🏳️</span>';
    const iso2Lower = iso2.toLowerCase();
    return `<img src="https://flagcdn.com/16x12/${iso2Lower}.png" width="16" height="12" alt="${iso2}" title="${iso2}" style="vertical-align:middle; margin-right:6px; border-radius:1px;">`;
  }

  async function loadData() {
    try {
      const res = await fetch("../output/tour_gs_champions.json");
      const data = await res.json();
      dataMap = data;
      if (data.meta) {
        minAge = data.meta.min_age;
        maxAge = data.meta.max_age;
      }
      initAgeSelector();
      resetToDefault();
      renderTable();
    } catch (err) {
      console.error("❌ 数据加载失败：", err);
    }
  }

  function initAgeSelector() {
    const select = document.getElementById('ageSelect');
    if (!select) return;
    while (select.options.length > 1) select.remove(1);
    for (let age = minAge; age <= maxAge; age++) {
      const option = document.createElement('option');
      option.value = age;
      option.textContent = age;
      select.appendChild(option);
    }
    select.addEventListener('change', (e) => {
      const val = e.target.value;
      if (val === 'career') currentAge = null;
      else currentAge = parseInt(val);
      resetToDefault();
      renderTable();
    });
  }

  function getPlayerDataByAge(player, age) {
    if (age === null) return player;
    if (player.age_entries && Array.isArray(player.age_entries)) {
      const entry = player.age_entries.find(e => e.age === age);
      if (entry) return entry;
      return player.age_entries[player.age_entries.length - 1];
    }
    return player;
  }

  let sortState = [];
  let userSorted = false;

  function getValueByCol(playerData, col) {
    if (!playerData) return null;
    switch (col) {
      case 'player': return playerData.player;
      case 'firstYear': return playerData.first_year;
      case 'ageFirst': return playerData.age_first;
      case 'lastYear': return playerData.last_year;
      case 'ageLast': return playerData.age_last;
      case 'span': return playerData.span;
      case 'titles': return playerData.titles;
      case 'W': return playerData.W;
      case 'L': return playerData.L;
      case 'agg': return playerData.agg;
      case 'hard': return playerData.win_h;
      case 'clay': return playerData.win_c;
      case 'grass': return playerData.win_g;
      default: return null;
    }
  }

  // 比较函数，player列特殊处理：冠军人数降序 → 总冠军数降序 → iso2升序
  function compareValues(a, b, col, order) {
    if (col !== 'player') {
      const dataA = getPlayerDataByAge(a, currentAge);
      const dataB = getPlayerDataByAge(b, currentAge);
      let valA = getValueByCol(dataA, col);
      let valB = getValueByCol(dataB, col);
      const isNullA = valA === null || valA === undefined;
      const isNullB = valB === null || valB === undefined;
      if (isNullA && isNullB) return 0;
      if (isNullA) return 1;
      if (isNullB) return -1;
      valA = Number(valA);
      valB = Number(valB);
      if (valA < valB) return order === 'asc' ? -1 : 1;
      if (valA > valB) return order === 'asc' ? 1 : -1;
      return 0;
    } else {
      // PLAYER 列排序规则：
      // 1. 按国家冠军人数（不同选手数）降序
      // 2. 若相同，按国家总冠军数降序
      // 3. 若还相同，按国家 iso2 升序
      const isoA = a.iso2 || '';
      const isoB = b.iso2 || '';

      const champCountA = countryChampionCount.get(isoA) || 0;
      const champCountB = countryChampionCount.get(isoB) || 0;

      if (champCountA !== champCountB) {
        return order === 'asc' ? champCountA - champCountB : champCountB - champCountA;
      }

      const titlesTotalA = countryTotalTitles.get(isoA) || 0;
      const titlesTotalB = countryTotalTitles.get(isoB) || 0;

      if (titlesTotalA !== titlesTotalB) {
        return order === 'asc' ? titlesTotalA - titlesTotalB : titlesTotalB - titlesTotalA;
      }

      if (isoA < isoB) return order === 'asc' ? -1 : 1;
      if (isoA > isoB) return order === 'asc' ? 1 : -1;

      return 0; // 相同国家，由后续排序条件决定
    }
  }

  function sortRows(rows) {
    if (!sortState.length) return rows;
    return [...rows].sort((a, b) => {
      for (let rule of sortState) {
        const cmp = compareValues(a, b, rule.col, rule.order);
        if (cmp !== 0) return cmp;
      }
      return 0;
    });
  }

  function updateSortIndicators() {
    document.querySelectorAll('.sortable').forEach(th => {
      const ind = th.querySelector('.sort-indicator');
      if (ind) ind.remove();
    });
    if (!userSorted) return;
    if (sortState.length > 0) {
      const primary = sortState[0];
      const th = document.querySelector(`th[data-col="${primary.col}"]`);
      if (th) {
        const arrow = primary.order === 'asc' ? '▲' : '▼';
        const span = document.createElement('span');
        span.className = 'sort-indicator';
        span.textContent = ' ' + arrow;
        th.appendChild(span);
      }
    }
  }

  function resetToDefault() {
    sortState = [
      { col: 'titles', order: 'desc' },
      { col: 'firstYear', order: 'asc' },
      { col: 'W', order: 'desc' }
    ];
    userSorted = false;
  }

  function handleSortClick(e) {
    const th = e.currentTarget;
    const col = th.getAttribute('data-col');
    if (!col) return;
    userSorted = true;
    const existingIdx = sortState.findIndex(s => s.col === col);
    let newOrder = 'desc';
    if (existingIdx !== -1) {
      newOrder = sortState[existingIdx].order === 'asc' ? 'desc' : 'asc';
      sortState.splice(existingIdx, 1);
    }
    sortState.unshift({ col, order: newOrder });
    renderTable();
  }

  const footerText = `1ST TITLE = year of first Grand Slam title &nbsp;·&nbsp;
    AGE 1ST = age at first title &nbsp;·&nbsp;
    LAST TITLE = year of last Grand Slam title &nbsp;·&nbsp;
    AGE LAST = age at last title &nbsp;·&nbsp;
    SPAN = last - first + 1 &nbsp;·&nbsp;
    AO = Australian Open &nbsp; RG = Roland Garros &nbsp;
    WIM = Wimbledon &nbsp; USO = US Open &nbsp;·&nbsp; <br>
    AGG = aggregate GS win rate &nbsp;·&nbsp;
    H = Hard · C = Clay · G = Grass &nbsp;·&nbsp;
    Titles: ≥2 <span style="color:#4a9eff">■</span>
    ≥5 <span style="color:#e8a838">■</span>
    ≥10 <span style="color:#f5c842">■</span> &nbsp;·&nbsp;
    Win rate: ≥70%/75% <span style="color:#e8a838">■</span>
    ≥80%/85% <span style="color:#2dd4b0">■</span>`;

  function titlesBg(titles) {
    if (titles >= 10) return '#f5c842';
    if (titles >= 5) return '#e8a838';
    if (titles >= 2) return '#4a9eff';
    return 'transparent';
  }
  function titlesFc(titles) {
    return titles >= 2 ? '#111111' : '#e5e5e5';
  }
  function aggBg(pct) {
    if (pct === null || pct === undefined) return 'transparent';
    if (pct >= 90) return 'rgb(4,120,87)';
    if (pct >= 85) return 'rgb(7,123,89)';
    if (pct >= 80) return 'rgb(42,159,121)';
    if (pct >= 75) return 'rgb(227,152,45)';
    if (pct >= 70) return 'rgb(247,213,118)';
    return 'transparent';
  }
  function aggColor(pct) {
    if (pct === null || pct === undefined) return '#6b7280';
    if (pct >= 85) return '#ffffff';
    if (pct >= 70) return '#111111';
    return '#6b7280';
  }
  function surfBg(pct) {
    if (pct === null || pct === undefined) return 'transparent';
    if (pct >= 90) return 'rgb(4,120,87)';
    if (pct >= 85) return 'rgb(39,157,119)';
    if (pct >= 80) return 'rgb(67,186,144)';
    if (pct >= 75) return 'rgb(235,174,72)';
    if (pct >= 70) return 'rgb(249,218,124)';
    return 'transparent';
  }
  function surfColor(pct) {
    if (pct === null || pct === undefined) return '#6b7280';
    if (pct >= 85) return '#ffffff';
    if (pct >= 75) return '#111111';
    if (pct >= 70) return '#111111';
    return '#6b7280';
  }
  function fmt(val) {
    return (val === null || val === undefined) ? '—' : val + '%';
  }
  function fmtAge(age) {
    return (age === null || age === undefined) ? '—' : age.toFixed(1);
  }

  function renderTable() {
    const players = dataMap[currentTour] || [];

    // 统计每个国家的冠军人数（不同选手数）和总冠军数
    countryChampionCount.clear();
    countryTotalTitles.clear();
    for (const p of players) {
      const iso = p.iso2 || '';
      // 冠军人数：每名选手计数1
      countryChampionCount.set(iso, (countryChampionCount.get(iso) || 0) + 1);
      // 总冠军数：累加该选手的冠军数
      countryTotalTitles.set(iso, (countryTotalTitles.get(iso) || 0) + (p.titles || 0));
    }

    const sorted = sortRows(players);
    const tbody = document.getElementById('table-body');
    const countSpan = document.getElementById('champion-count');
    const footerTd = document.getElementById('table-footer');

    countSpan.textContent = sorted.length + ' champions';
    footerTd.innerHTML = footerText;

    let html = '';
    sorted.forEach((player, idx) => {
      const playerData = getPlayerDataByAge(player, currentAge);
      const titlesNum = playerData.titles ?? 0;
      const careerTitles = player.titles ?? 0;
      let titleDisplay = (currentAge === null) ? careerTitles : `${titlesNum} / ${careerTitles}`;

      const titleBg = titlesBg(titlesNum);
      const titleColor = titlesFc(titlesNum);
      const aggBgColor = aggBg(playerData.agg);
      const aggTextColor = aggColor(playerData.agg);
      const hardBgColor = surfBg(playerData.win_h);
      const hardTextColor = surfColor(playerData.win_h);
      const clayBgColor = surfBg(playerData.win_c);
      const clayTextColor = surfColor(playerData.win_c);
      const grassBgColor = surfBg(playerData.win_g);
      const grassTextColor = surfColor(playerData.win_g);

      html += `<tr>
      <td style="color:#6b7280;text-align:center;font-size:11px;">${idx + 1}</td>
      <td style="color:#f3f4f6;font-weight:600;padding-left:8px;">
        ${getFlagImg(player.iso2)} ${player.player} (${player.birth_year})
      </td>
      <td style="text-align:center;color:#e5e5e5;">${playerData.first_year ?? '—'}</td>
      <td style="text-align:center;color:#e5e5e5;">${fmtAge(playerData.age_first)}</td>
      <td style="text-align:center;color:#e5e5e5;">${playerData.last_year ?? '—'}</td>
      <td style="text-align:center;color:#e5e5e5;">${fmtAge(playerData.age_last)}</td>
      <td style="text-align:center;color:#f5c842;font-weight:bold;">${playerData.span ?? 0}</td>
      <td style="text-align:center;background:${titleBg};color:${titleColor};font-weight:bold;">${titleDisplay}</td>
      <td style="color:#9ca3af;font-size:11px;white-space:nowrap;padding-left:6px;">${playerData.titles_str || '—'}</td>
      <td style="text-align:center;color:#e5e5e5;">${playerData.W ?? 0}</td>
      <td style="text-align:center;color:#6b7280;">${playerData.L ?? 0}</td>
      <td style="text-align:center;background:${aggBgColor};color:${aggTextColor};">${fmt(playerData.agg)}</td>
      <td style="text-align:center;background:${hardBgColor};color:${hardTextColor};">${fmt(playerData.win_h)}</td>
      <td style="text-align:center;background:${clayBgColor};color:${clayTextColor};">${fmt(playerData.win_c)}</td>
      <td style="text-align:center;background:${grassBgColor};color:${grassTextColor};">${fmt(playerData.win_g)}</td>
    </tr>`;
    });
    tbody.innerHTML = html;
    updateSortIndicators();
  }

  document.querySelectorAll('.sortable').forEach(th => {
    th.addEventListener('click', handleSortClick);
  });

  const tourSelect = document.getElementById('tourSelect');
  if (tourSelect) {
    tourSelect.addEventListener('change', e => {
      currentTour = e.target.value;
      resetToDefault();
      renderTable();
    });
  }

  loadData();
</script>
</body>
</html>
