<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Non-GS Champions · GS Win Rate Top 100</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=202604291654">
  <style>
    body {
      min-width: 920px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }
    h1   { font-size: 19px !important; }

    .table {
    min-width: 850px;
    width: 100%;
    table-layout: fixed;
    font-size: 13px;
    margin-bottom: 0;
  }

    #table-body td:nth-child(2) {
      text-align: left !important;
      padding-left: 12px !important;
    }
    .table thead tr:first-child th {
      border-bottom: none !important;
      font-size: 10px !important;
      color: #a78b5e;
      padding-bottom: 2px;
    }



    /* Winrate 色块 */
    .wr-cell {
      border-radius: 5px; padding: 3px 5px;
      display: inline-block; font-weight: 600; font-size: 12px;
      min-width: 46px; text-align: center;
    }
    .agg-90 { background: var(--agg-90-bg); color: var(--agg-90-color); }
    .agg-85 { background: var(--agg-85-bg); color: var(--agg-85-color); }
    .agg-80 { background: var(--agg-80-bg); color: var(--agg-80-color); }
    .agg-75 { background: var(--agg-75-bg); color: var(--agg-75-color); }
    .agg-70 { background: var(--agg-70-bg); color: var(--agg-70-color); }
    .agg-no { color: var(--text-muted); }
    .surf-90 { background: var(--surf-90-bg); color: var(--surf-90-color); }
    .surf-85 { background: var(--surf-85-bg); color: var(--surf-85-color); }
    .surf-80 { background: var(--surf-80-bg); color: var(--surf-80-color); }
    .surf-75 { background: var(--surf-75-bg); color: var(--surf-75-color); }
    .surf-70 { background: var(--surf-70-bg); color: var(--surf-70-color); }
    .surf-no { color: var(--text-muted); }

    /* 强制顶部两行不换行，无视小屏断点 */
body > .row {
  flex-wrap: nowrap !important;
}
body > .row > .col {
  flex: 1 1 auto !important;
  max-width: none !important;
  width: auto !important;
}
body > .row > .col-auto {
  flex: 0 0 auto !important;
}
body > .row .d-flex.gap-3 {
  flex-wrap: nowrap !important;
}
/* checkbox 文字不折行 */
.form-check-inline {
  white-space: nowrap !important;
}
  </style>
</head>
<body>

  <div class="row align-items-center mb-3">
    <div class="col">
      <h1 class="mb-0">Grand Slam Singles · Non-Champions Leaderboard (Top 100 by Win%, Wins &gt; 5)</h1>
    </div>
    <div class="col-auto">
      <a href="../index.html" class="btn btn-outline-warning btn-sm">HOME</a>
    </div>
  </div>

  <div class="row align-items-center mb-3">
    <div class="col">
      <small class="text-muted">
        <span id="champion-count" class="fw-bold text-warning">0 players</span>
        &nbsp;|&nbsp; Click headers to sort
        &nbsp;|&nbsp; <span id="last-updated"></span>
      </small>
    </div>
    <div class="col-auto">
      <div class="d-flex gap-3 align-items-center">
        <div class="form-check form-check-inline mb-0">
          <input type="checkbox" id="activeOnlyCheckbox" class="form-check-input">
          <label for="activeOnlyCheckbox" class="form-check-label small">
            🎾 ACTIVE ONLY (won GS match in last 2 years)
          </label>
        </div>
        <div class="d-flex align-items-center gap-1">
          <label for="tourSelect" class="form-label mb-0 text-nowrap">TOUR:</label>
          <select id="tourSelect" class="form-select form-select-sm">
            <option value="wta" selected>WTA</option>
            <option value="atp">ATP</option>
          </select>
        </div>
      </div>
    </div>
  </div>

    <table class="table table-hover table-sm mb-0">
      <colgroup>
  <col style="width: 40px;">
  <col style="width: 210px;">
  <col style="width: 60px;">
  <col style="width: 50px;">
  <col style="width: 50px;">
  <col style="width: 50px;">
  <col style="width: 50px;">
  <col style="width: 48px;">
  <col style="width: 48px;">
  <col style="width: 62px;">
  <col style="width: 55px;">
  <col style="width: 55px;">
  <col style="width: 55px;">
</colgroup>
      <thead>
        <tr>
          <th colspan="3"></th>
          <th colspan="4" style="text-align:center; padding-bottom:2px;">BEST RESULT (BY SLAM)</th>
          <th colspan="2"></th>
          <th colspan="4" style="border-left:1px solid var(--border-main); text-align:center; padding-bottom:2px;">WINRATE</th>
        </tr>
        <tr>
          <th>#</th>
          <th class="sortable" data-col="player">PLAYER</th>
          <th class="sortable" data-col="best">⭐ BEST</th>
          <th class="sortable" data-col="AO">AO</th>
          <th class="sortable" data-col="RG">RG</th>
          <th class="sortable" data-col="WIM">WIM</th>
          <th class="sortable" data-col="USO">USO</th>
          <th class="sortable" data-col="W">W</th>
          <th class="sortable" data-col="L">L</th>
          <th class="sortable" data-col="agg" style="border-left:1px solid var(--border-main);">AGG</th>
          <th class="sortable" data-col="hard">H</th>
          <th class="sortable" data-col="clay">C</th>
          <th class="sortable" data-col="grass">G</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
      <tfoot>
        <tr>
          <td colspan="13" id="table-footer" style="padding-top:18px;color:var(--text-muted);font-size:12px;line-height:1.8;border-bottom:none;background:transparent;white-space:normal;"></td>
        </tr>
      </tfoot>
    </table>


  <script type="module">
    import { getFlagImg, fmtWinrate, fmtRound } from "./utils.js?v=202604291654"

    let jsonData = null;
    let currentTour = 'wta';
    let activeOnly = false;
    let sortColumn = 'agg';
    let sortOrder = 'desc';

    function aggCls(pct) {
      if (pct == null) return 'wr-cell agg-no';
      if (pct >= 90) return 'wr-cell agg-90';
      if (pct >= 85) return 'wr-cell agg-85';
      if (pct >= 80) return 'wr-cell agg-80';
      if (pct >= 75) return 'wr-cell agg-75';
      if (pct >= 70) return 'wr-cell agg-70';
      return 'wr-cell agg-no';
    }
    function surfCls(pct) {
      if (pct == null) return 'wr-cell surf-no';
      if (pct >= 90) return 'wr-cell surf-90';
      if (pct >= 85) return 'wr-cell surf-85';
      if (pct >= 80) return 'wr-cell surf-80';
      if (pct >= 75) return 'wr-cell surf-75';
      if (pct >= 70) return 'wr-cell surf-70';
      return 'wr-cell surf-no';
    }

    function isActive(p, maxYear) {
      return p.stats.last_win_year && (maxYear - p.stats.last_win_year) < 2;
    }

    function compareValues(a, b, col) {
      if (col === 'player') {
        const iA = a.ioc || '', iB = b.ioc || '';
        if (iA !== iB) return iA < iB ? -1 : 1;
        return a.player.toLowerCase().localeCompare(b.player.toLowerCase());
      }
      const rankMap = { W:1,F:2,SF:3,QF:4,R16:5,R32:6,R64:7,R128:8,'—':999 };
      if (col === 'best') {
        return (rankMap[a.stats.best_display]||999) - (rankMap[b.stats.best_display]||999);
      }
      if (['AO','RG','WIM','USO'].includes(col)) {
        return (rankMap[a.stats[`${col.toLowerCase()}_best`]]||999) - (rankMap[b.stats[`${col.toLowerCase()}_best`]]||999);
      }
      const key = { W:'W',L:'L',agg:'agg',hard:'win_h',clay:'win_c',grass:'win_g' }[col];
      const vA = a.stats[key] ?? null, vB = b.stats[key] ?? null;
      if (vA === null && vB === null) return 0;
      if (vA === null) return 1;
      if (vB === null) return -1;
      return vA - vB;
    }

    function sortPlayers(players) {
      return [...players].sort((a, b) => {
        let cmp = compareValues(a, b, sortColumn);
        return sortOrder === 'desc' ? -cmp : cmp;
      });
    }

    function renderTable() {
      if (!jsonData) return;
      let players = jsonData[currentTour] || [];
      if (activeOnly) {
        const maxYear = jsonData.meta.max_years[currentTour];
        players = players.filter(p => isActive(p, maxYear));
      }
      const sorted = sortPlayers(players);
      document.getElementById('champion-count').textContent = sorted.length + ' players';
      document.getElementById('table-footer').innerHTML = `
        BEST = Career best GS result &nbsp;·&nbsp;
        AO/RG/WIM/USO = Best result at each major &nbsp;·&nbsp;
        AGG = aggregate GS win rate &nbsp;·&nbsp; H = Hard · C = Clay · G = Grass &nbsp;·&nbsp;<br>
        Win rate colour: ≥70%
        <span style="display:inline-block;width:12px;height:12px;background:var(--agg-70-bg);border-radius:2px;vertical-align:middle;"></span>
        ≥80%
        <span style="display:inline-block;width:12px;height:12px;background:var(--agg-80-bg);border-radius:2px;vertical-align:middle;"></span>
        ≥90%
        <span style="display:inline-block;width:12px;height:12px;background:var(--agg-90-bg);border-radius:2px;vertical-align:middle;"></span>
        (AGG solid · H/C/G tint)`;

      let html = '';
      sorted.forEach((player, idx) => {
        const s = player.stats;
        const dob = player.dob ? ` (${player.dob})` : '';
        html += `<tr>
          <td style="color:var(--text-hint);font-size:11px;">${idx + 1}</td>
          <td style="text-align:left;padding-left:12px;">${getFlagImg(player.ioc)} ${player.player}${dob}</td>
          <td>${fmtRound(s.best_display)}</td>
          <td>${fmtRound(s.ao_best)}</td>
          <td>${fmtRound(s.rg_best)}</td>
          <td>${fmtRound(s.wim_best)}</td>
          <td>${fmtRound(s.uso_best)}</td>
          <td style="color:var(--text-secondary);font-weight:600;">${s.W}</td>
          <td style="color:var(--text-muted);">${s.L}</td>
          <td style="border-left:1px solid var(--border-light);">
            <span class="${aggCls(s.agg)}">${fmtWinrate(s.agg)}</span>
          </td>
          <td><span class="${surfCls(s.win_h)}">${fmtWinrate(s.win_h)}</span></td>
          <td><span class="${surfCls(s.win_c)}">${fmtWinrate(s.win_c)}</span></td>
          <td><span class="${surfCls(s.win_g)}">${fmtWinrate(s.win_g)}</span></td>
        </tr>`;
      });
      document.getElementById('table-body').innerHTML = html;
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll('.sortable').forEach(th => {
        const ind = th.querySelector('.sort-indicator');
        if (ind) ind.remove();
      });
      const th = document.querySelector(`th[data-col="${sortColumn}"]`);
      if (th) {
        const span = document.createElement('span');
        span.className = 'sort-indicator';
        span.textContent = sortOrder === 'asc' ? ' ▲' : ' ▼';
        th.appendChild(span);
      }
    }

    document.querySelectorAll('.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.getAttribute('data-col');
        if (!col) return;
        if (sortColumn === col) sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
        else { sortColumn = col; sortOrder = 'desc'; }
        renderTable();
      });
    });

    document.getElementById('tourSelect').addEventListener('change', e => {
      currentTour = e.target.value; sortColumn = 'agg'; sortOrder = 'desc'; renderTable();
    });
    document.getElementById('activeOnlyCheckbox').addEventListener('change', e => {
      activeOnly = e.target.checked; sortColumn = 'agg'; sortOrder = 'desc'; renderTable();
    });

    async function loadData() {
      try {
        const res = await fetch('../output/tour_non_gs_champions.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        jsonData = await res.json();
        renderTable();
      } catch (err) {
        document.getElementById('table-body').innerHTML =
          '<tr><td colspan="13" style="color:#b91c1c;text-align:center;padding:40px;">Failed to load data.</td></tr>';
      }
    }

    loadData();
    const el = document.getElementById('last-updated');
    if (el) el.textContent = 'Last updated: 2026-04-20';
  </script>
</body>
</html>
